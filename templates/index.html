<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.DWN // AGY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="grid-bg"></div>
    <div class="deco deco-tl">+</div>
    <div class="deco deco-bl">+</div>
    <div class="deco deco-br">+</div>
    
    <button class="power-off-btn" id="power-off-btn" title="SHUTDOWN SYSTEM">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
            <line x1="12" y1="2" x2="12" y2="12"></line>
        </svg>
    </button>

    <main class="container main-layout">
        <div class="left-panel">
            <header class="header">
                <h1>VIDEO-DWN</h1>
                <p class="subtitle">[ PROTOCOL: MEDIA_ACQUISITION ]<span class="cursor">_</span></p>
            </header>
            
            <form id="fetch-form" class="download-form">
                <div class="input-group">
                    <label for="url">TARGET.URL</label>
                    <input type="url" id="url" name="url" placeholder="INPUT VALID NETWORK PROTOCOL..." required>
                </div>
                <button type="submit" class="submit-btn" id="fetch-btn">
                    <span>FETCH_METADATA</span>
                </button>
            </form>
            
            <div id="metadata-panel" class="metadata-panel hidden">
                <div class="meta-content">
                    <img id="meta-thumb" src="" alt="Thumbnail">
                    <div class="meta-info">
                        <h3 id="meta-title">TITLE</h3>
                        <p>DUR: <span id="meta-duration"></span></p>
                    </div>
                </div>
                
                <div class="options-row">
                    <div class="input-group select-group">
                        <label for="quality">RES.MATRIX</label>
                        <select id="quality" name="quality">
                            <option value="best">MAX_AVAILABLE</option>
                            <option value="1080p">1080P_CAP</option>
                            <option value="720p">720P_CAP</option>
                        </select>
                    </div>
                    
                    <div class="input-group select-group">
                        <label for="format">FORMAT</label>
                        <select id="format" name="format">
                            <option value="mp4">VID_MP4</option>
                            <option value="mkv">VID_MKV</option>
                            <option value="audio">AUDIO_ONLY</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label for="subfolder">PATH.SUBFOLDER (OPTIONAL)</label>
                    <input type="text" id="subfolder" placeholder="e.g. music/">
                </div>
                
                <div class="action-row" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button id="start-btn" class="submit-btn" style="flex: 2; margin-top:0;">START_ACQUIRE</button>
                    <button id="cancel-meta-btn" class="secondary-btn" style="flex: 1; margin-top:0;">ABORT</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h2 class="dashboard-title">
                TASKS <span class="task-count" id="task-count">0</span>
                <button id="clear-all-btn" class="secondary-btn" style="float: right; padding: 4px 10px; font-size: 0.65rem; margin-top: -4px; width: auto;">CLEAR_DONE</button>
                <button id="cancel-all-btn" class="secondary-btn" style="float: right; padding: 4px 10px; font-size: 0.65rem; margin-top: -4px; width: auto; margin-right: 5px;">HALT_ALL</button>
            </h2>
            <div id="task-list" class="task-list">
                <!-- Task items injected here -->
            </div>
        </div>
        
        <div id="offline-container" class="offline-container hidden">
            <h1 class="offline-text">SYSTEM OFFLINE</h1>
            <p class="offline-sub">CONNECTION TERMINATED.</p>
        </div>
        
        <div id="toast-container" class="toast-container"></div>
    </main>
    
    <!-- Template for task card -->
    <template id="task-template">
        <div class="task-card">
            <img class="task-thumb" src="" alt="Thumb">
            <div class="task-details">
                <div class="task-header">
                    <span class="task-title">TITLE</span>
                    <div class="task-actions">
                        <button class="task-action task-open hidden" title="Open Folder">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                        <button class="task-action task-retry hidden" title="Retry Task">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path></svg>
                        </button>
                        <button class="task-action task-cancel" title="Dismiss/Cancel">X</button>
                    </div>
                </div>
                <div class="task-status">STATUS</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
                <div class="task-stats">
                    <span class="t-spd">--</span>
                    <span class="t-size">--</span>
                    <span class="t-eta">--</span>
                    <span class="t-prg">0%</span>
                </div>
            </div>
        </div>
    </template>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
